name: Update Submodules

on:
  repository_dispatch:
    types: [submodule-update]
  workflow_dispatch:
    inputs:
      submodule:
        description: "Submodule to update (leave empty for all)"
        required: false
        type: choice
        options:
          - all
          - sca-client
          - sca-server

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PAT_TOKEN }}

      - name: Determine which submodule to update
        id: target
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "submodule=${{ github.event.client_payload.submodule }}" >> "$GITHUB_OUTPUT"
          else
            echo "submodule=${{ inputs.submodule || 'all' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update submodules
        run: |
          TARGET="${{ steps.target.outputs.submodule }}"

          if [[ "$TARGET" == "all" || -z "$TARGET" ]]; then
            git submodule update --remote --merge
          else
            git submodule update --remote --merge "$TARGET"
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update submodules to latest"
          git push
